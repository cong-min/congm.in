<!doctype html>
<!-- Inspired by Cong Min · Recoded by Claude -->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cong Min</title>
    <meta name="description" content="Cong Min — Stay Curious">
    <meta name="generator" content="Recoded by Claude">
    <meta name="theme-color" content="#181b21">
    <link rel="icon" href="./favicon.ico">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Cong Min">
    <meta property="og:description" content="Stay Curious">
    <meta property="og:url" content="https://congm.in/">
    <meta property="og:image" content="https://congm.in/og.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preload" href="./assets/fonts/Ubuntu.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <h1 class="sr-only">Cong Min</h1>

    <!-- screen 1: dark cover (wallpaper + white name); the cover blooms in from the centre on load -->
    <div class="screen screen1">
        <div class="cover">
            <div class="wallpaper"></div>
            <div class="filter"></div>
            <svg class="wordmark wm-light" viewBox="0 0 630 180" aria-hidden="true"><text x="50%" y="50%" dy=".35em">Cong Min</text></svg>
        </div>
    </div>

    <!-- screen 2: light; revealed by the cursor lens on screen 1, fully on scroll.
         the name + motto are photo-filled by a full-viewport SVG <image> (the same aligned
         cover as screen 1) masked to the glyph shapes and composited source-over, so the
         watermark / black-hole filter re-rendering behind them never disturbs the fill -->
    <div class="screen screen2" id="screen2">
        <div class="watermark" id="watermark" aria-hidden="true"></div>

        <svg class="photo-name" id="photo-name" aria-hidden="true"
             xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
             preserveAspectRatio="none">
            <defs>
                <!-- luminance mask: white reveals the photo, transparent hides it. The outer svg
                     has no viewBox, so 1 user unit == 1px and coordinates are CSS px. -->
                <mask id="photo-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100%" height="100%"
                      color-interpolation="sRGB">
                    <!-- name: a flat <text> (no nested <svg>, which mobile engines drop inside a
                         <mask>); lens.js sets x/y/font-size/stroke-width to match screen 1's box. -->
                    <text id="mask-name" class="mask-wordmark" text-anchor="middle" dy=".35em">Cong Min</text>
                    <!-- motto: live typewriter text; lens.js sets x/y to a watermark row. -->
                    <text id="mask-motto" class="mask-motto" x="50%" y="50%" text-anchor="middle" xml:space="preserve">Stay <tspan class="motto-word" id="motto-word"></tspan><tspan class="motto-caret" id="motto-caret">.<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" calcMode="discrete" repeatCount="indefinite"/></tspan></text>
                </mask>
            </defs>
            <g mask="url(#photo-mask)">
                <!-- grey fallback shown while the photo is loading (image hidden via CSS) -->
                <rect x="0" y="0" width="100%" height="100%" fill="#4a515d"/>
                <!-- the same aligned cover as screen 1: xMidYMid slice == background center/cover -->
                <image id="photo-image" x="0" y="0" width="100%" height="100%"
                       preserveAspectRatio="xMidYMid slice"
                       href="https://congm.in/bing" xlink:href="https://congm.in/bing"/>
            </g>
            <!-- transparent hover target for the motto (mask content never receives pointer
                 events); lens.js keeps it over #mask-motto, motto.js binds pause/resume on it -->
            <text id="motto-hit" class="motto-hit" x="50%" y="50%" text-anchor="middle"
                  xml:space="preserve" fill="transparent" pointer-events="all">Stay Passionate.</text>
        </svg>

        <!-- accessible motto text for screen readers -->
        <p class="sr-only">Stay curious, inspired, creative, passionate, grounded, patient, present, humble.</p>
    </div>

    <!-- gives the page scroll height (screens are fixed) -->
    <div class="scroll-spacer" aria-hidden="true"></div>

    <!-- scroll-down hint: a mouse with a scrolling wheel (top layer, so the lens never blocks the click) -->
    <div class="scroll-hint" aria-hidden="true">
        <svg viewBox="0 0 24 32" width="18" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="2" width="18" height="26" rx="9"/>
            <circle class="scroll-wheel" cx="12" cy="9" r="2" fill="#fff" stroke="none"/>
        </svg>
    </div>

    <!-- black hole: feDisplacementMap warps the watermark around the cursor -->
    <svg width="0" height="0" aria-hidden="true" style="position:absolute"><defs>
        <filter id="bhf" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
            <feFlood flood-color="rgb(128,128,128)" result="neutral"/>
            <feImage id="bh-map" x="0" y="0" width="320" height="320" preserveAspectRatio="none" result="lensmap"/>
            <feComposite in="lensmap" in2="neutral" operator="over" result="map"/>
            <feDisplacementMap in="SourceGraphic" in2="map" scale="-30" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs></svg>

    <script src="./assets/js/lens.js" defer></script>
    <script src="./assets/js/motto.js" defer></script>
</body>
</html>
